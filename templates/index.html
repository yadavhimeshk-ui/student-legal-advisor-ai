
<!DOCTYPE html>
<html>
<head>
    <title>Student Legal Advisor AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
        }

        /* HEADER */
        .header {
            background: #1e3a5f;
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            height: 90vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            box-shadow: 2px 0px 5px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            margin-bottom: 10px;
        }

        .sidebar p {
            margin: 8px 0;
            cursor: pointer;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            background: #f9fbfd;
            padding: 20px;
            border-radius: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 60%;
        }

        .user {
            background: #d6e4f0;
            align-self: flex-end;
        }

        .bot {
            background: #2c5d8a;
            color: white;
            align-self: flex-start;
        }

        /* INPUT BOX */
        .input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            background: #2c5d8a;
            color: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* FEEDBACK */
        .feedback {
            margin-top: 10px;
        }

        .feedback button {
            border-radius: 10px;
            padding: 5px 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        ⚖️ Student Legal Advisor AI
    </div>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Quick Links</h3>
            <p>📚 Academic Appeals</p>
            <p>⚖️ Student Discipline</p>
            <p>💼 Employment Rights</p>
            <p>🏠 Housing & Leases</p>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">

            <div class="chat-box">

                {% if user_input %}
                    <div class="message user">
                        {{ user_input }}
                    </div>
                {% endif %}

                {% if response %}
                    <div class="message bot">
                        {{ response }}
                    </div>
                {% endif %}

            </div>

            <!-- INPUT -->
            <form method="POST" class="input-area">
                <input type="hidden" name="form_type" value="question">
                <input type="text" name="question" placeholder="Type your question here..." required>
                <button type="submit">➤</button>
            </form>

            <!-- FEEDBACK -->
            {% if response %}
            <div class="feedback">
                <form method="POST">
                    <input type="hidden" name="form_type" value="feedback">
                    <input type="hidden" name="feedback_question" value="{{ user_input }}">
                    <input type="hidden" name="feedback_answer" value="{{ response }}">

                    <button name="feedback" value="good">👍 Good</button>
                    <button name="feedback" value="bad">👎 Bad</button>
                </form>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
